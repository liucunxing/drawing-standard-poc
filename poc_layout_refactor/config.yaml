low_dpi: 150
high_dpi: 300
render_reuse_existing: true
render_force: false
layout_threshold: 0.2
layout_model_name: PP-DocLayout_plus-L
layout_device: cpu
layout_enable_mkldnn: false
layout_enable_cinn: false
layout_cpu_threads: 4
layout_nms: true
layout_merge_bboxes_mode: union
layout_fallback_on_error: true
keep_labels:
  - table
  - text
  - aside_text
  - figure_title
keep_image_in_right_column: true
margin_table: 0.05
margin_text: 0.08
margin_roi: 0.05
candidate_max_area_ratio: 0.35
candidate_min_height_ratio: 0.03
candidate_min_width_ratio: 0.03
candidate_zone_min_fit_ratio: 0.8
candidate_zone_iou_threshold: 0.5
candidate_final_iou_threshold: 0.5
candidate_merge_horizontal_overlap: 0.45
candidate_merge_vertical_gap_ratio: 0.035
candidate_max_count: 8
precise_table_threshold: 0.5
precise_table_margin: 0.02
precise_table_dedupe_iou_threshold: 0.9
dedupe_iou_threshold: 0.75
merge_iou_threshold: 0.18
merge_vertical_gap_ratio: 0.035
merge_horizontal_gap_ratio: 0.025
